###############################################################################
# Generated by generate.sh on 2026-06-08.
#
# Filename convention: topology-<prefix>-<YYYY-MM-DD>.yml — ACT requires
# unique filenames across the tenant. Re-run generate.sh on another day to
# get a fresh filename.
#
# Switch identity is pinned via serial_number + system_mac_address so devices
# keep the same identity in CVaaS across redeploys.
###############################################################################

veos:
  username: cvpadmin
  password: cvp123!
  version: 4.34.5M
  # Required for CVaaS: every vEOS needs outbound internet to reach
  # apiserver.arista.io. This toolkit targets CVaaS (not on-prem CVP, which
  # ACT can stand up locally), so we always enable it.
  internet_access: true

nodes:

  ###########################################################################
  # Spines
  ###########################################################################

  - example-spine1:
      node_type: veos
      ip_addr: 192.168.0.11/24
      serial_number: example-spine1
      system_mac_address: 00:1c:73:00:01:01
      ztp: false

  - example-spine2:
      node_type: veos
      ip_addr: 192.168.0.12/24
      serial_number: example-spine2
      system_mac_address: 00:1c:73:00:01:02
      ztp: false

  - example-spine3:
      node_type: veos
      ip_addr: 192.168.0.13/24
      serial_number: example-spine3
      system_mac_address: 00:1c:73:00:01:03
      ztp: false

  ###########################################################################
  # Leaves
  ###########################################################################

  - example-leaf1:
      node_type: veos
      ip_addr: 192.168.0.21/24
      serial_number: example-leaf1
      system_mac_address: 00:1c:73:00:02:01
      ztp: false

  - example-leaf2:
      node_type: veos
      ip_addr: 192.168.0.22/24
      serial_number: example-leaf2
      system_mac_address: 00:1c:73:00:02:02
      ztp: false

  - example-leaf3:
      node_type: veos
      ip_addr: 192.168.0.23/24
      serial_number: example-leaf3
      system_mac_address: 00:1c:73:00:02:03
      ztp: false

  - example-leaf4:
      node_type: veos
      ip_addr: 192.168.0.24/24
      serial_number: example-leaf4
      system_mac_address: 00:1c:73:00:02:04
      ztp: false

  - example-leaf5:
      node_type: veos
      ip_addr: 192.168.0.25/24
      serial_number: example-leaf5
      system_mac_address: 00:1c:73:00:02:05
      ztp: false

  - example-leaf6:
      node_type: veos
      ip_addr: 192.168.0.26/24
      serial_number: example-leaf6
      system_mac_address: 00:1c:73:00:02:06
      ztp: false

  ###########################################################################
  # Member leaves (L2 access, dual-homed to a leaf pair)
  ###########################################################################

  - example-mleaf1:
      node_type: veos
      ip_addr: 192.168.0.131/24
      serial_number: example-mleaf1
      system_mac_address: 00:1c:73:00:03:01
      ztp: false

  - example-mleaf2:
      node_type: veos
      ip_addr: 192.168.0.132/24
      serial_number: example-mleaf2
      system_mac_address: 00:1c:73:00:03:02
      ztp: false

  - example-mleaf3:
      node_type: veos
      ip_addr: 192.168.0.133/24
      serial_number: example-mleaf3
      system_mac_address: 00:1c:73:00:03:03
      ztp: false

  - example-mleaf4:
      node_type: veos
      ip_addr: 192.168.0.134/24
      serial_number: example-mleaf4
      system_mac_address: 00:1c:73:00:03:04
      ztp: false

###############################################################################
# Data-plane links
#   spine <-> leaf full mesh: spine[i] Ethernet[j] <-> leaf[j] Ethernet[i]
#   MLAG peer links:          leaf<odd> <-> leaf<even> on the next two ports
#                             after the spine uplinks
#   Member-leaf uplinks:      mleaf:Eth1/2 <-> leaf<odd>/leaf<even> on the
#                             ports after the MLAG peer links
###############################################################################
links:
  - connection: [example-spine1:Ethernet1, example-leaf1:Ethernet1]
  - connection: [example-spine1:Ethernet2, example-leaf2:Ethernet1]
  - connection: [example-spine1:Ethernet3, example-leaf3:Ethernet1]
  - connection: [example-spine1:Ethernet4, example-leaf4:Ethernet1]
  - connection: [example-spine1:Ethernet5, example-leaf5:Ethernet1]
  - connection: [example-spine1:Ethernet6, example-leaf6:Ethernet1]

  - connection: [example-spine2:Ethernet1, example-leaf1:Ethernet2]
  - connection: [example-spine2:Ethernet2, example-leaf2:Ethernet2]
  - connection: [example-spine2:Ethernet3, example-leaf3:Ethernet2]
  - connection: [example-spine2:Ethernet4, example-leaf4:Ethernet2]
  - connection: [example-spine2:Ethernet5, example-leaf5:Ethernet2]
  - connection: [example-spine2:Ethernet6, example-leaf6:Ethernet2]

  - connection: [example-spine3:Ethernet1, example-leaf1:Ethernet3]
  - connection: [example-spine3:Ethernet2, example-leaf2:Ethernet3]
  - connection: [example-spine3:Ethernet3, example-leaf3:Ethernet3]
  - connection: [example-spine3:Ethernet4, example-leaf4:Ethernet3]
  - connection: [example-spine3:Ethernet5, example-leaf5:Ethernet3]
  - connection: [example-spine3:Ethernet6, example-leaf6:Ethernet3]

  # MLAG peer links
  - connection: [example-leaf1:Ethernet4, example-leaf2:Ethernet4]
  - connection: [example-leaf1:Ethernet5, example-leaf2:Ethernet5]
  - connection: [example-leaf3:Ethernet4, example-leaf4:Ethernet4]
  - connection: [example-leaf3:Ethernet5, example-leaf4:Ethernet5]
  - connection: [example-leaf5:Ethernet4, example-leaf6:Ethernet4]
  - connection: [example-leaf5:Ethernet5, example-leaf6:Ethernet5]

  # Member-leaf uplinks
  - connection: [example-mleaf1:Ethernet1, example-leaf1:Ethernet6]
  - connection: [example-mleaf1:Ethernet2, example-leaf2:Ethernet6]
  - connection: [example-mleaf2:Ethernet1, example-leaf1:Ethernet7]
  - connection: [example-mleaf2:Ethernet2, example-leaf2:Ethernet7]
  - connection: [example-mleaf3:Ethernet1, example-leaf3:Ethernet6]
  - connection: [example-mleaf3:Ethernet2, example-leaf4:Ethernet6]
  - connection: [example-mleaf4:Ethernet1, example-leaf3:Ethernet7]
  - connection: [example-mleaf4:Ethernet2, example-leaf4:Ethernet7]
