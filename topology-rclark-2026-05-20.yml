###############################################################################
# ACT Topology: 2 spine, 4 leaf
#
# Filename convention: topology-<user>-<YYYY-MM-DD>.yml
#   ACT requires topology filenames to be unique across the tenant, so suffix
#   with your prefix and the date. Bump the date when uploading a revision.
#
# Switch identity is pinned via serial_number + system_mac_address so devices
# keep the same identity in CVaaS across topology redeploys. If you want to
# share this file, change the "rclark-" prefix on each serial to your own.
#
# ztp: false on every switch — devices boot with the default config
# (cvpadmin / cvp123!) so you can SSH in immediately to paste the CVaaS
# onboarding snippet that bootstrap.sh generates.
###############################################################################

veos:
  username: cvpadmin
  password: cvp123!
  version: 4.32.2F

nodes:

  ###########################################################################
  # Spines
  ###########################################################################
  - spine1:
      node_type: veos
      ip_addr: 192.168.0.11/24
      serial_number: rdc-spine1
      system_mac_address: 00:1c:73:00:01:01
      ztp: false

  - spine2:
      node_type: veos
      ip_addr: 192.168.0.12/24
      serial_number: rdc-spine2
      system_mac_address: 00:1c:73:00:01:02
      ztp: false

  ###########################################################################
  # Leaves
  ###########################################################################
  - leaf1:
      node_type: veos
      ip_addr: 192.168.0.21/24
      serial_number: rdc-leaf1
      system_mac_address: 00:1c:73:00:02:01
      ztp: false

  - leaf2:
      node_type: veos
      ip_addr: 192.168.0.22/24
      serial_number: rdc-leaf2
      system_mac_address: 00:1c:73:00:02:02
      ztp: false

  - leaf3:
      node_type: veos
      ip_addr: 192.168.0.23/24
      serial_number: rdc-leaf3
      system_mac_address: 00:1c:73:00:02:03
      ztp: false

  - leaf4:
      node_type: veos
      ip_addr: 192.168.0.24/24
      serial_number: rdc-leaf4
      system_mac_address: 00:1c:73:00:02:04
      ztp: false

###############################################################################
# Data-plane links (spine <-> leaf full mesh)
###############################################################################
links:
  - connection: [spine1:Ethernet1, leaf1:Ethernet1]
  - connection: [spine1:Ethernet2, leaf2:Ethernet1]
  - connection: [spine1:Ethernet3, leaf3:Ethernet1]
  - connection: [spine1:Ethernet4, leaf4:Ethernet1]

  - connection: [spine2:Ethernet1, leaf1:Ethernet2]
  - connection: [spine2:Ethernet2, leaf2:Ethernet2]
  - connection: [spine2:Ethernet3, leaf3:Ethernet2]
  - connection: [spine2:Ethernet4, leaf4:Ethernet2]
