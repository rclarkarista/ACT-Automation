###############################################################################
# Generated by generate.sh on 2026-05-29.
#
# Filename convention: topology-<prefix>-<YYYY-MM-DD>.yml — ACT requires
# unique filenames across the tenant. Re-run generate.sh on another day to
# get a fresh filename.
#
# Switch identity is pinned via serial_number + system_mac_address so devices
# keep the same identity in CVaaS across redeploys.
###############################################################################

veos:
  username: cvpadmin
  password: cvp123!
  version: 4.32.2F
  internet_access: true

nodes:

  ###########################################################################
  # Spines
  ###########################################################################

  - rclark-alab-spine1:
      node_type: veos
      ip_addr: 192.168.0.11/24
      serial_number: rclark-spine1
      system_mac_address: 00:1c:73:00:01:01
      ztp: false

  - rclark-alab-spine2:
      node_type: veos
      ip_addr: 192.168.0.12/24
      serial_number: rclark-spine2
      system_mac_address: 00:1c:73:00:01:02
      ztp: false

  - rclark-alab-spine3:
      node_type: veos
      ip_addr: 192.168.0.13/24
      serial_number: rclark-spine3
      system_mac_address: 00:1c:73:00:01:03
      ztp: false

  ###########################################################################
  # Leaves
  ###########################################################################

  - rclark-alab-leaf1:
      node_type: veos
      ip_addr: 192.168.0.21/24
      serial_number: rclark-leaf1
      system_mac_address: 00:1c:73:00:02:01
      ztp: false

  - rclark-alab-leaf2:
      node_type: veos
      ip_addr: 192.168.0.22/24
      serial_number: rclark-leaf2
      system_mac_address: 00:1c:73:00:02:02
      ztp: false

  - rclark-alab-leaf3:
      node_type: veos
      ip_addr: 192.168.0.23/24
      serial_number: rclark-leaf3
      system_mac_address: 00:1c:73:00:02:03
      ztp: false

  - rclark-alab-leaf4:
      node_type: veos
      ip_addr: 192.168.0.24/24
      serial_number: rclark-leaf4
      system_mac_address: 00:1c:73:00:02:04
      ztp: false

  - rclark-alab-leaf5:
      node_type: veos
      ip_addr: 192.168.0.25/24
      serial_number: rclark-leaf5
      system_mac_address: 00:1c:73:00:02:05
      ztp: false

  - rclark-alab-leaf6:
      node_type: veos
      ip_addr: 192.168.0.26/24
      serial_number: rclark-leaf6
      system_mac_address: 00:1c:73:00:02:06
      ztp: false

###############################################################################
# Data-plane links
#   spine <-> leaf full mesh: spine[i] Ethernet[j] <-> leaf[j] Ethernet[i]
#   MLAG peer links:          leaf<odd> <-> leaf<even> on the next two ports
#                             after the spine uplinks
###############################################################################
links:
  - connection: [rclark-alab-spine1:Ethernet1, rclark-alab-leaf1:Ethernet1]
  - connection: [rclark-alab-spine1:Ethernet2, rclark-alab-leaf2:Ethernet1]
  - connection: [rclark-alab-spine1:Ethernet3, rclark-alab-leaf3:Ethernet1]
  - connection: [rclark-alab-spine1:Ethernet4, rclark-alab-leaf4:Ethernet1]
  - connection: [rclark-alab-spine1:Ethernet5, rclark-alab-leaf5:Ethernet1]
  - connection: [rclark-alab-spine1:Ethernet6, rclark-alab-leaf6:Ethernet1]

  - connection: [rclark-alab-spine2:Ethernet1, rclark-alab-leaf1:Ethernet2]
  - connection: [rclark-alab-spine2:Ethernet2, rclark-alab-leaf2:Ethernet2]
  - connection: [rclark-alab-spine2:Ethernet3, rclark-alab-leaf3:Ethernet2]
  - connection: [rclark-alab-spine2:Ethernet4, rclark-alab-leaf4:Ethernet2]
  - connection: [rclark-alab-spine2:Ethernet5, rclark-alab-leaf5:Ethernet2]
  - connection: [rclark-alab-spine2:Ethernet6, rclark-alab-leaf6:Ethernet2]

  - connection: [rclark-alab-spine3:Ethernet1, rclark-alab-leaf1:Ethernet3]
  - connection: [rclark-alab-spine3:Ethernet2, rclark-alab-leaf2:Ethernet3]
  - connection: [rclark-alab-spine3:Ethernet3, rclark-alab-leaf3:Ethernet3]
  - connection: [rclark-alab-spine3:Ethernet4, rclark-alab-leaf4:Ethernet3]
  - connection: [rclark-alab-spine3:Ethernet5, rclark-alab-leaf5:Ethernet3]
  - connection: [rclark-alab-spine3:Ethernet6, rclark-alab-leaf6:Ethernet3]

  # MLAG peer links
  - connection: [rclark-alab-leaf1:Ethernet4, rclark-alab-leaf2:Ethernet4]
  - connection: [rclark-alab-leaf1:Ethernet5, rclark-alab-leaf2:Ethernet5]
  - connection: [rclark-alab-leaf3:Ethernet4, rclark-alab-leaf4:Ethernet4]
  - connection: [rclark-alab-leaf3:Ethernet5, rclark-alab-leaf4:Ethernet5]
  - connection: [rclark-alab-leaf5:Ethernet4, rclark-alab-leaf6:Ethernet4]
  - connection: [rclark-alab-leaf5:Ethernet5, rclark-alab-leaf6:Ethernet5]
